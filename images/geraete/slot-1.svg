<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="machine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="50%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2D2D2D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8941F"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Machine body -->
  <rect x="50" y="50" width="500" height="700" rx="30" fill="url(#machine)" stroke="#D4AF37" stroke-width="4"/>
  <!-- Top marquee -->
  <rect x="70" y="70" width="460" height="100" rx="10" fill="#0D0D0D" stroke="#D4AF37" stroke-width="2"/>
  <text x="300" y="135" text-anchor="middle" fill="#D4AF37" font-family="Arial" font-size="36" font-weight="bold">LUCKY STARS</text>
  <!-- Screen -->
  <rect x="80" y="190" width="440" height="300" rx="5" fill="url(#screen)" stroke="#D4AF37" stroke-width="2"/>
  <!-- Reels -->
  <g fill="#D4AF37">
    <text x="150" y="380" text-anchor="middle" font-size="80">7️⃣</text>
    <text x="300" y="380" text-anchor="middle" font-size="80">⭐</text>
    <text x="450" y="380" text-anchor="middle" font-size="80">7️⃣</text>
  </g>
  <!-- Control panel -->
  <rect x="100" y="520" width="400" height="200" rx="10" fill="#1A1A1A" stroke="#D4AF37" stroke-width="2"/>
  <!-- Buttons -->
  <circle cx="180" cy="600" r="40" fill="url(#gold)"/>
  <text x="180" y="610" text-anchor="middle" fill="#0D0D0D" font-size="14" font-weight="bold">SPIN</text>
  <circle cx="300" cy="600" r="30" fill="#C41E3A"/>
  <circle cx="400" cy="600" r="30" fill="#2D2D2D" stroke="#D4AF37" stroke-width="2"/>
</svg>