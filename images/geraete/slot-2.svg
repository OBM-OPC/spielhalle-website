<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="machine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="50%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Machine body -->
  <rect x="50" y="50" width="500" height="700" rx="25" fill="url(#machine)" stroke="#FFD700" stroke-width="4"/>
  <!-- Header -->
  <rect x="70" y="70" width="460" height="90" rx="8" fill="#0D0D0D" stroke="#FFD700" stroke-width="2"/>
  <text x="300" y="130" text-anchor="middle" fill="#FFD700" font-family="Arial" font-size="32" font-weight="bold">GOLDEN VEGAS</text>
  <!-- Main screen -->
  <rect x="80" y="180" width="440" height="320" rx="8" fill="#0a0a1a" stroke="#FFD700" stroke-width="2"/>
  <!-- Vegas symbols -->
  <text x="150" y="380" text-anchor="middle" font-size="70" fill="#FFD700">💎</text>
  <text x="300" y="380" text-anchor="middle" font-size="70" fill="#FFD700">🎰</text>
  <text x="450" y="380" text-anchor="middle" font-size="70" fill="#FFD700">💰</text>
  <!-- Bottom panel -->
  <rect x="90" y="530" width="420" height="190" rx="10" fill="#1A1A1A"/>
  <!-- Play button -->
  <rect x="200" y="580" width="200" height="60" rx="30" fill="url(#gold)"/>
  <text x="300" y="620" text-anchor="middle" fill="#0D0D0D" font-size="20" font-weight="bold">PLAY NOW</text>
</svg>