<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="50%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="960" cy="540" r="400" fill="url(#glow)"/>
  <!-- Decorative elements -->
  <g opacity="0.1">
    <circle cx="200" cy="200" r="100" fill="#D4AF37"/>
    <circle cx="1720" cy="800" r="150" fill="#D4AF37"/>
    <circle cx="1500" cy="300" r="80" fill="#D4AF37"/>
  </g>
</svg>