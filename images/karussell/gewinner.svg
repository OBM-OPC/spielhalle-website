<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg2)"/>
  <!-- Spotlight effect -->
  <ellipse cx="600" cy="200" rx="300" ry="100" fill="#D4AF37" opacity="0.1"/>
  <!-- Happy guests silhouettes -->
  <g fill="#2D2D2D">
    <!-- Person 1 -->
    <circle cx="300" cy="350" r="40"/>
    <rect x="260" y="390" width="80" height="120" rx="20"/>
    <!-- Person 2 -->
    <circle cx="600" cy="320" r="45"/>
    <rect x="555" y="365" width="90" height="140" rx="20"/>
    <!-- Person 3 -->
    <circle cx="900" cy="340" r="42"/>
    <rect x="858" y="382" width="84" height="125" rx="20"/>
  </g>
  <!-- Excitement symbols -->
  <g font-size="40">
    <text x="250" y="250">🎉</text>
    <text x="350" y="200">💰</text>
    <text x="550" y="180">🏆</text>
    <text x="650" y="220">⭐</text>
    <text x="850" y="240">🎰</text>
    <text x="950" y="200">💎</text>
  </g>
  <text x="600" y="550" text-anchor="middle" fill="#D4AF37" font-family="Arial" font-size="32" font-weight="bold">🎊 Gewinnmomente</text>
  <text x="600" y="585" text-anchor="middle" fill="#888" font-family="Arial" font-size="16">Freude • Spannung • Erfolg</text>
</svg>