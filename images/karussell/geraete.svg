<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="50%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg3)"/>
  <!-- Slot machine close-up -->
  <g transform="translate(400, 100)">
    <!-- Machine body -->
    <rect x="0" y="0" width="400" height="350" rx="20" fill="#2D2D2D" stroke="#D4AF37" stroke-width="3"/>
    <!-- Top display -->
    <rect x="20" y="20" width="360" height="60" rx="10" fill="#0D0D0D" stroke="#D4AF37" stroke-width="2"/>
    <text x="200" y="58" text-anchor="middle" fill="#D4AF37" font-family="Arial" font-size="20" font-weight="bold">JACKPOT</text>
    <!-- Reel window -->
    <rect x="30" y="100" width="340" height="150" rx="5" fill="#0a0a1a" stroke="#D4AF37" stroke-width="2"/>
    <!-- Reels -->
    <rect x="50" y="110" width="90" height="130" fill="#1a1a2e"/>
    <rect x="155" y="110" width="90" height="130" fill="#1a1a2e"/>
    <rect x="260" y="110" width="90" height="130" fill="#1a1a2e"/>
    <!-- Symbols -->
    <text x="95" y="190" text-anchor="middle" font-size="50">7️⃣</text>
    <text x="200" y="190" text-anchor="middle" font-size="50">7️⃣</text>
    <text x="305" y="190" text-anchor="middle" font-size="50">7️⃣</text>
    <!-- Control panel -->
    <rect x="40" y="270" width="320" height="60" rx="10" fill="#1A1A1A"/>
    <circle cx="200" cy="300" r="25" fill="#D4AF37"/>
  </g>
  <!-- Sparkles -->
  <g font-size="30" fill="#FFD700">
    <text x="350" y="100">✨</text>
    <text x="850" y="150">✨</text>
    <text x="300" y="400">✨</text>
    <text x="880" y="380">✨</text>
  </g>
  <text x="600" y="520" text-anchor="middle" fill="#D4AF37" font-family="Arial" font-size="32" font-weight="bold">💎 Premium-Geräte</text>
  <text x="600" y="555" text-anchor="middle" fill="#888" font-family="Arial" font-size="16">Neueste Technologie • HD-Displays • Faire Chancen</text>
</svg>