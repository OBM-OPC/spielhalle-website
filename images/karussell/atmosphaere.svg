<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="50%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg1)"/>
  <circle cx="600" cy="300" r="400" fill="url(#glow1)"/>
  <!-- Arcade machines silhouette -->
  <g opacity="0.3">
    <rect x="100" y="150" width="120" height="350" rx="10" fill="#2D2D2D"/>
    <rect x="280" y="120" width="140" height="380" rx="10" fill="#2D2D2D"/>
    <rect x="480" y="100" width="160" height="400" rx="10" fill="#2D2D2D"/>
    <rect x="700" y="130" width="140" height="370" rx="10" fill="#2D2D2D"/>
    <rect x="900" y="160" width="120" height="340" rx="10" fill="#2D2D2D"/>
  </g>
  <!-- Screens glowing -->
  <g>
    <rect x="115" y="180" width="90" height="70" rx="5" fill="#D4AF37" opacity="0.6"/>
    <rect x="300" y="160" width="100" height="80" rx="5" fill="#D4AF37" opacity="0.7"/>
    <rect x="510" y="140" width="100" height="90" rx="5" fill="#FFD700" opacity="0.8"/>
    <rect x="720" y="165" width="100" height="80" rx="5" fill="#D4AF37" opacity="0.6"/>
    <rect x="915" y="190" width="90" height="70" rx="5" fill="#D4AF37" opacity="0.5"/>
  </g>
  <text x="600" y="450" text-anchor="middle" fill="#D4AF37" font-family="Arial" font-size="32" font-weight="bold">🎰 Spielhallen-Atmosphäre</text>
  <text x="600" y="490" text-anchor="middle" fill="#888" font-family="Arial" font-size="16">Modern • Elegant • Einladend</text>
</svg>